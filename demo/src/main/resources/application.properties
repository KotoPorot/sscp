spring.application.name=OnePageSite

spring.datasource.url=jdbc:h2:file:./data/mydb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# ?????????? SQL ?? Hibernate ? ??????? ??? ???????
spring.jpa.show-sql=true


spring.liquibase.change-log=classpath:/db/changelog/master.yaml

# --- H2 Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- ??????????? (???????????? ??????? ??? ???????????) ---
logging.level.org.liquibase=DEBUG
logging.level.org.springframework.boot.autoconfigure.liquibase=DEBUG