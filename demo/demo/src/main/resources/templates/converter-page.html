<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Java String Converter</title>
    <style>
        .container { display: flex; gap: 20px; padding: 20px; }
        textarea { width: 100%; height: 400px; font-family: monospace; }
        .column { flex: 1; }
        .button-row { text-align: center; margin-top: 10px; }
        button { padding: 10px 30px; cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>

<h2 style="text-align: center;">Конвертер объектов</h2>

<form th:action="@{/convert}" method="post">
    <div class="container">
        <div class="column">
            <label>Данные с сервера (Original):</label>
            <textarea name="inputText" th:text="${input}" readonly></textarea>
        </div>

        <div class="column">
            <label>Результат (Upper Case):</label>
            <textarea readonly th:text="${output}"></textarea>
        </div>
    </div>

    <div class="button-row">
        <button type="submit">Конвертировать в UpperCase</button>
    </div>
</form>

</body>
</html>
